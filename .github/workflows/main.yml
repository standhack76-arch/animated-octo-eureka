# ╔══════════════════════════════════════════════════════════════════════════╗
# ║          ZIP → MARKDOWN BUNDLER  —  GitHub Actions Workflow  v3.1      ║
# ║                                                                        ║
# ║  SETUP (one-time):                                                     ║
# ║    1. This file  →  .github/workflows/bundle.yml                       ║
# ║    2. zip_bundler.py  →  repo root                                     ║
# ║    3. yourproject.zip  →  repo root                                    ║
# ║    4. git add . && git commit -m "setup" && git push                   ║
# ║    5. Actions tab → watch run → Summary → download link                ║
# ╚══════════════════════════════════════════════════════════════════════════╝
 
name: "📦 ZIP → Markdown Bundler"
 
on:
  push:
    branches:
      - main
      - master
      - develop
 
  workflow_dispatch:
    inputs:
      zip_filename:
        description: "ZIP filename (blank = auto-detect first .zip in root)"
        required: false
        default: ""
      output_filename:
        description: "Output .md filename"
        required: false
        default: "project_codebase.md"
 
permissions:
  contents: write
  pull-requests: write
 
jobs:
  bundle:
    name: "📦 Detect → Bundle → Upload → Summarise"
    runs-on: ubuntu-latest
 
    steps:
 
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      # NOTE: no  cache: "pip"  — that option crashes when the repo has no
      # requirements.txt or pyproject.toml (which is the case here).
      - name: "🐍 Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: "🔍 Detect ZIP File"
        id: detect
        shell: bash
        run: |
          # resolve output filename
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                -n "${{ inputs.output_filename }}" ]]; then
            OUTPUT_FILE="${{ inputs.output_filename }}"
          else
            OUTPUT_FILE="project_codebase.md"
          fi
 
          # resolve zip filename
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                -n "${{ inputs.zip_filename }}" ]]; then
            ZIP_NAME="${{ inputs.zip_filename }}"
          else
            ZIP_NAME=$(find . -maxdepth 1 -name "*.zip" -printf "%f\n" \
                       2>/dev/null | sort | head -1)
          fi
 
          if [[ -z "$ZIP_NAME" ]]; then
            echo "::error::No .zip found in the repository root."
            echo ""
            echo "Your repo must contain:"
            echo "  ├── .github/workflows/bundle.yml   <- this file"
            echo "  ├── zip_bundler.py                 <- bundler script"
            echo "  └── yourproject.zip                <- YOUR zip  <- MISSING"
            exit 1
          fi
 
          if [[ ! -f "$ZIP_NAME" ]]; then
            echo "::error::ZIP specified but not found on disk: $ZIP_NAME"
            exit 1
          fi
 
          ZIP_SIZE=$(du -sh "$ZIP_NAME" | cut -f1)
          echo "ZIP found  : $ZIP_NAME  ($ZIP_SIZE)"
          echo "Output file: $OUTPUT_FILE"
 
          echo "zip_name=${ZIP_NAME}"       >> "$GITHUB_OUTPUT"
          echo "output_file=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
 
      - name: "📋 Verify zip_bundler.py"
        shell: bash
        run: |
          if [[ ! -f "zip_bundler.py" ]]; then
            echo "::error::zip_bundler.py not found in the repository root."
            exit 1
          fi
          echo "zip_bundler.py found."
          python --version
 
      - name: "🚀 Run Bundler"
        id: run_bundler
        shell: bash
        env:
          ZIP_NAME:    ${{ steps.detect.outputs.zip_name }}
          OUTPUT_FILE: ${{ steps.detect.outputs.output_file }}
        run: |
          echo "ZIP    : $ZIP_NAME"
          echo "Output : $OUTPUT_FILE"
          python zip_bundler.py "$ZIP_NAME" "$OUTPUT_FILE"
 
          if [[ ! -f "$OUTPUT_FILE" ]]; then
            echo "::error::Bundler ran but output file not created: $OUTPUT_FILE"
            exit 1
          fi
          echo "Output created: $OUTPUT_FILE"
 
      - name: "📊 Collect Statistics"
        id: stats
        shell: bash
        env:
          OUTPUT_FILE: ${{ steps.detect.outputs.output_file }}
        run: |
          MD_SIZE=$(du -sh "$OUTPUT_FILE" | cut -f1)
          MD_LINES=$(wc -l < "$OUTPUT_FILE")
          SRC_FILES=$(grep -c "^### \[" "$OUTPUT_FILE" 2>/dev/null || echo "0")
 
          echo "md_size=${MD_SIZE}"       >> "$GITHUB_OUTPUT"
          echo "md_lines=${MD_LINES}"     >> "$GITHUB_OUTPUT"
          echo "src_files=${SRC_FILES}"   >> "$GITHUB_OUTPUT"
 
          echo ".md size     : $MD_SIZE"
          echo ".md lines    : $MD_LINES"
          echo "source files : $SRC_FILES"
 
      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name:              codebase-bundle
          path:              ${{ steps.detect.outputs.output_file }}
          retention-days:    30
          if-no-files-found: error
 
      - name: "💾 Commit Output to Repository"
        shell: bash
        env:
          OUTPUT_FILE: ${{ steps.detect.outputs.output_file }}
          ZIP_NAME:    ${{ steps.detect.outputs.zip_name }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE"
          if git diff --staged --quiet; then
            echo "No changes in output - skipping commit."
          else
            git commit \
              -m "auto-bundle: ${ZIP_NAME} -> ${OUTPUT_FILE} [skip ci]" \
              -m "Generated by github-actions[bot] at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD
            echo "Committed and pushed: $OUTPUT_FILE"
          fi
 
      - name: "💬 Comment on Pull Request"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          OUTPUT_FILE: ${{ steps.detect.outputs.output_file }}
          ZIP_NAME:    ${{ steps.detect.outputs.zip_name }}
          MD_SIZE:     ${{ steps.stats.outputs.md_size }}
          MD_LINES:    ${{ steps.stats.outputs.md_lines }}
          SRC_FILES:   ${{ steps.stats.outputs.src_files }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## Codebase Bundle Generated
            | Metric | Value |
            |--------|-------|
            | Source ZIP | \`${process.env.ZIP_NAME}\` |
            | Output File | \`${process.env.OUTPUT_FILE}\` |
            | Output Size | ${process.env.MD_SIZE} |
            | Total Lines | ${process.env.MD_LINES} |
            | Source Files | ${process.env.SRC_FILES} |
            Download the .md from the **Artifacts** section of this run.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
 
      - name: "📋 Write Step Summary"
        shell: bash
        env:
          OUTPUT_FILE: ${{ steps.detect.outputs.output_file }}
          ZIP_NAME:    ${{ steps.detect.outputs.zip_name }}
          MD_SIZE:     ${{ steps.stats.outputs.md_size }}
          MD_LINES:    ${{ steps.stats.outputs.md_lines }}
          SRC_FILES:   ${{ steps.stats.outputs.src_files }}
          REPO:        ${{ github.repository }}
          BRANCH:      ${{ github.ref_name }}
          RUN_ID:      ${{ github.run_id }}
        run: |
          DIRECT_URL="https://github.com/${REPO}/blob/${BRANCH}/${OUTPUT_FILE}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/${OUTPUT_FILE}"
          ARTIFACT_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
 
          {
            echo "# ZIP to Markdown Bundle - Complete"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Status | Success |"
            echo "| Source ZIP | \`${ZIP_NAME}\` |"
            echo "| Output File | \`${OUTPUT_FILE}\` |"
            echo "| Output Size | ${MD_SIZE} |"
            echo "| Total Lines | ${MD_LINES} |"
            echo "| Source Files | ${SRC_FILES} |"
            echo "| Branch | \`${BRANCH}\` |"
            echo ""
            echo "---"
            echo ""
            echo "## Download Your Bundle"
            echo ""
            echo "### Way 1 - Artifact (30 days)"
            echo "[Click here - scroll to bottom - download codebase-bundle](${ARTIFACT_URL})"
            echo ""
            echo "### Way 2 - Raw file in repo"
            echo "[Direct raw download - right-click Save As](${RAW_URL})"
            echo ""
            echo "\`\`\`bash"
            echo "curl -L \"${RAW_URL}\" -o ${OUTPUT_FILE}"
            echo "\`\`\`"
            echo ""
            echo "### Way 3 - View in GitHub"
            echo "[View file in repo](${DIRECT_URL}) then click Raw button then Ctrl+S"
            echo ""
            echo "---"
            echo ""
            echo "## Upload to AI"
            echo ""
            echo "1. Download \`${OUTPUT_FILE}\` using any method above"
            echo "2. Upload to Google AI Studio / Claude.ai / ChatGPT"
          } >> "$GITHUB_STEP_SUMMARY"
 
          echo "Summary written."
